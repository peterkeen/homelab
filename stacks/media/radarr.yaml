kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: radarr-configs-pvc
spec:
  storageClassName: longhorn
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: radarr-cluster
spec:
  instances: 2
  storage:
    storageClass: longhorn-local
    size: 4Gi
  backup:
    barmanObjectStore:
      destinationPath: "s3://media-backups/radarr/"
      endpointURL: http://10.73.95.84:30157/
      s3Credentials:
        accessKeyId:
          name: media-backup-secrets
          key: AWS_ACCESS_KEY_ID
        secretAccessKey:
          name: media-backup-secrets
          key: AWS_SECRET_ACCESS_KEY    
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: radarr
  labels:
    app: radarr
  annotations:
    keel.sh/policy: "force"
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 24h"
    keel.sh/approvals: "0"
    keel.sh/match-tag: "true"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: radarr
  template:
    metadata:
      labels:
        app: radarr
    spec:
      nodeName: hypnotoad
      nodeSelector:
        topology.kubernetes.io/zone: home-1
      volumes:
        - name: media-nfs
          nfs:
            server: 10.73.95.84
            path: /mnt/tank/media
        - name: radarr-configs
          persistentVolumeClaim:
            claimName: radarr-configs-pvc
      containers:
        # - name: shell
        #   image: alpine:3
        #   imagePullPolicy: "Always"
        #   volumeMounts:
        #     - name: radarr-configs
        #       mountPath: /config
        #     - name: media-nfs
        #       mountPath: /media
        #   command: ["sh", "-c", "tail -f /dev/null"]
        - name: radarr
          image: lscr.io/linuxserver/radarr:latest
          imagePullPolicy: "IfNotPresent"
          volumeMounts:
            - name: media-nfs
              mountPath: /media
            - name: radarr-configs
              mountPath: /config
          resources:
            requests:
              memory: 512Mi
            limits:
              memory: 512Mi              
---
apiVersion: v1
kind: Service
metadata:
  name: radarr
spec:
  selector:
    app: radarr
  ports:
    - protocol: TCP
      port: 7878
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: radarr-private
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - radarr.keen.land
      secretName: keenland-radarr-ingress-cert
  rules:
    - host: radarr.keen.land
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: radarr
                port:
                  number: 7878
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: radarr
spec:
  targetRef:
    apiVersion: "apps/v1"
    kind:       Deployment
    name:       radarr
  updatePolicy:
    updateMode: "Off"
