apiVersion: apps/v1
kind: Deployment
metadata:
  name: smallsites
  labels:
    app: smallsites
  annotations:
    keel.sh/policy: "force"
    keel.sh/approvals: "0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smallsites
  template:
    metadata:
      labels:
        app: smallsites
    spec:
      containers:
        - name: smallsites
          image: ghcr.io/keenfamily-us/infra/stacks/smallsites:latest
          resources:
            requests:
              memory: 16Mi
            limits:
              memory: 16Mi          
      imagePullSecrets:
        - name: ghcr.io
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
                - key: cloud
                  operator: In
                  values:
                    - "true"
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: smallsites
              topologyKey: "kubernetes.io/hostname"
---
apiVersion: v1
kind: Service
metadata:
  name: smallsites
spec:
  selector:
    app: smallsites
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: smallsites-public
  annotations:
    nginx.ingress.kubernetes.io/from-to-www-redirect: "true"
    external-dns.alpha.kubernetes.io/target: "66.241.125.38,2a09:8280:1:8968:d249:6201:cd71:c56b"    
spec:
  ingressClassName: nginx-public-fly
  tls:
    - hosts:
        - www.payola.io
        - payola.io
        - www.corastreetpress.com
        - corastreetpress.com
        - www.okapi.io
        - okapi.io
  rules:
    - host: www.payola.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: smallsites
                port:
                  number: 80
    - host: www.okapi.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: smallsites
                port:
                  number: 80
    - host: www.corastreetpress.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: smallsites
                port:
                  number: 80
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: smallsites
spec:
  targetRef:
    apiVersion: "apps/v1"
    kind:       Deployment
    name:       smallsites
  updatePolicy:
    updateMode: "Off"
