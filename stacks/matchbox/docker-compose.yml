services:
  matchbox:
    container_name: matchbox
    hostname: matchbox
    image: "quay.io/poseidon/matchbox:v0.11.0"
    volumes:
      - /data/matchbox/lib:/var/lib/matchbox
      - /data/matchbox/config:/etc/matchbox
    restart: unless-stopped
    network_mode: host
    command: ["-address=0.0.0.0:8901", "-log-level=debug"]

  matchbox-dhcp:
    image: "quay.io/poseidon/dnsmasq"
    network_mode: host
    cap_add:
      - NET_ADMIN
    command:
      - -d
      - -q
      - --dhcp-range=10.73.95.1,proxy,255.255.255.0
      - --enable-tftp
      - --tftp-root=/var/lib/tftpboot
      - --dhcp-userclass=set:ipxe,iPXE
      - --pxe-service=tag:#ipxe,x86PC,"PXE chainload to iPXE",undionly.kpxe
      - --pxe-service=tag:ipxe,x86PC,"iPXE",http://matchbox.example.com:8080/boot.ipxe
      - --pxe-service=tag:#ipxe,X86-64_EFI,"PXE chainload to iPXE UEFI",ipxe.efi
      - --pxe-service=tag:ipxe,X86-64_EFI,"iPXE UEFI",http:///matchbox.example.com:8080/boot.ipxe
      - --log-queries
      - --log-dhcp
