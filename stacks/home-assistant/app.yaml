kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: homeassistant-configs-pvc
spec:
  storageClassName: longhorn
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
---
apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  name: macvlan-static
spec:
  config: '{
      "cniVersion": "0.3.0",
      "name": "macvlan-conf",
      "type": "macvlan",
      "master": "br0",
      "mode": "bridge",
      "ipam": {
        "type": "static"
      }
    }'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homeassistant
  labels:
    app: homeassistant
  annotations:
    keel.sh/policy: "major"
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 24h"
    keel.sh/approvals: "1"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: homeassistant
  template:
    metadata:
      labels:
        app: homeassistant
      annotations:
        k8s.v1.cni.cncf.io/networks: |
          [
            {
              "name": "macvlan-static",
              "ips": ["10.73.95.4/24"]
            }
          ]
    spec:
      nodeSelector:
        topology.kubernetes.io/zone: home-1
      volumes:
        - name: homeassistant-configs
          persistentVolumeClaim:
            claimName: homeassistant-configs-pvc
        - name: backups-nfs
          nfs:
            server: 10.73.95.84
            path: /mnt/tank/backups/home-assistant
      containers:
        - name: homeassistant
          image: "ghcr.io/home-assistant/home-assistant:2025.8.0"
          imagePullPolicy: "IfNotPresent"
          volumeMounts:
            - name: homeassistant-configs
              mountPath: /config
            - name: backups-nfs
              mountPath: /config/backups
          env:
            - name: TZ
              value: America/Detroit
          resources:
            requests:
              memory: '8Gi'
            limits:
              memory: '8Gi'              
---
apiVersion: v1
kind: Service
metadata:
  name: homeassistant
spec:
  selector:
    app: homeassistant
  ports:
    - protocol: TCP
      port: 8123
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homeassistant-private
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 3g
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - hass.keen.land
      secretName: keenland-homeassistant-ingress-cert
  rules:
    - host: hass.keen.land
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: homeassistant
                port:
                  number: 8123
---
apiVersion: v1
kind: Service
metadata:
  name: homeassistant-metal
  annotations:
    metallb.universe.tf/loadBalancerIPs: 10.10.10.15
spec:
  selector:
    app: homeassistant
  ports:
    - protocol: TCP
      port: 8123
      targetPort: 8123
  type: LoadBalancer
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: homeassistant
spec:
  targetRef:
    apiVersion: "apps/v1"
    kind:       Deployment
    name:       homeassistant
  updatePolicy:
    updateMode: "Off" 
