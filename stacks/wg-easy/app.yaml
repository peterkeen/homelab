apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: wg-easy-secrets
spec:
  itemPath: "vaults/fmycvdzmeyvbndk7s7pjyrebtq/items/52cvnkltmo46hga425h3bku4wy"
---
kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: wg-easy
spec:
  storageClassName: longhorn
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wg-easy
  annotations:
    keel.sh/policy: "major"
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 24h"
    keel.sh/approvals: "1"
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: wg-easy
  strategy:
    # Restrict to a Single wg-easy instance, on redeploys it will tear down the old one before bring a new one up.
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wg-easy
    spec:
      containers:
        - name: wg-easy
          image: ghcr.io/wg-easy/wg-easy:15.1.0
          imagePullPolicy: IfNotPresent
          # Give pod permissions to modify iptables and load the wireguard kernel module
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          # Persistent storage location
          volumeMounts:
            - mountPath: /etc/wireguard
              name: config
          resources:
            requests:
              memory: 128Mi
            limits:
              memory: 128Mi
      restartPolicy: Always
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: wg-easy
---
apiVersion: v1
kind: Service
metadata:
  name: wg-easy-wg
spec:
  ports:
    - name: wg
      port: 30000
      targetPort: 51820
      protocol: UDP
  selector:
    app.kubernetes.io/name: wg-easy
  type: LoadBalancer
---
apiVersion: v1
kind: Service
metadata:
  name: wg-easy-http
spec:
  ports:
    - name: http
      port: 51821
      targetPort: 51821
      protocol: TCP
  selector:
    app.kubernetes.io/name: wg-easy
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wg-easy
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - wg.keen.land
      secretName: keenland-wg-ingress-cert
  rules:
    - host: wg.keen.land
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wg-easy-http
                port:
                  number: 51821
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: wg-easy
spec:
  targetRef:
    apiVersion: "apps/v1"
    kind:       Deployment
    name:       wg-easy
  updatePolicy:
    updateMode: "Off"
