services:
  homer:
    container_name: homer-up
    hostname: homer
    image: ghcr.io/keenfamily-us/infra/stacks/homer:latest
    restart: unless-stopped
    environment:
      - INIT_ASSETS=0
    labels:
      - "tsbridge.enabled=true"
      - "tsbridge.service.name=homer"
      - "tsbridge.service.port=8080"
    x-web:
      port: 8080
      fqdn: keen.land
