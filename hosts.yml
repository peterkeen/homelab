  hypnotoad-docker:
    environment:
      - "CONFIG=/data"
    stacks:
      - calendar-sync
      - calibre
      - certificates
      - ezshare-go
      - icloudpd-web
      - jellyfin
      - local-proxy
      - media
      - media-volume
      - smtp-relay
      - stalwart      

  lrrr-docker: # VM running on the N150 box
    environment:
      - "KEEPALIVED_INTERFACE=eth0"
    stacks:
      - certificates
      - gatus
      - genmon
      - home-assistant
      - homer
      - local-proxy
      - media-volume
      - mosquitto
      - paperless-ngx
      - parametric-zigbee
      - parametric-zwave
      - sabnzbd
      - smtp-relay
      - waterfurnace
      - wg-easy

  ord1: # VM on Vultr
