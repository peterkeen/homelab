defaults:
  stacks:
    - watchtower
    - backup
    - common
  environment:
    - "TZ=America/Detroit"
    - "CONFIGS_DIR=/root/app/stacks"
    - "CONFIG=/data"

hosts:
  # hermes: # nee wyse-3040-9c0d
  #   environment:
  #     - "CONFIG=/data"
